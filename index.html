<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>迅读书站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="迅读书站首页">
        <span class="brand-mark">迅</span>
        <span>
          <strong>迅读书站</strong>
          <small>Xundu Shelf</small>
        </span>
      </a>
      <nav class="literary-nav" aria-label="文学分类">
        <button class="nav-item is-active" data-section="narrative">叙事文学</button>
        <button class="nav-item" data-section="poetry">诗歌</button>
        <button class="nav-item" data-section="essay">散文随笔</button>
        <button class="nav-item" data-section="nonfiction">非虚构</button>
        <button class="nav-item" data-section="criticism">文学理论</button>
        <button class="nav-item" data-section="mystery">推理悬疑</button>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">WORLD NARRATIVES</p>
          <h1>迅读书站</h1>
          <p>
            从古希腊史诗到现代小说，从戏剧、童话到短篇集，一份按文学经验重新陈列的经典叙事书架。
          </p>
        </div>
        <div class="hero-stack" aria-hidden="true">
          <div class="stack-book cover-a">Homer</div>
          <div class="stack-book cover-b">Shakespeare</div>
          <div class="stack-book cover-c">Calvino</div>
        </div>
      </section>

      <section class="toolbar" aria-label="书籍筛选">
        <div class="toolbar-main">
          <label class="search-box">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="书名、作者、国家或语言" autocomplete="off" />
          </label>
          <div id="genreFilters" class="genre-filters" aria-label="叙事体裁筛选"></div>
        </div>
        <div class="shelf-count">
          <strong id="visibleCount">0</strong>
          <span id="countLabel">本在架</span>
        </div>
      </section>

      <section id="emptyState" class="empty-state" hidden>
        <p class="eyebrow">COMING SOON</p>
        <h2>暂无内容</h2>
        <p>这个分类还没有上架书目。当前书单内容集中在“叙事文学”。</p>
      </section>

      <section id="shelf" class="book-grid" aria-live="polite"></section>
    </main>

    <dialog id="bookDialog" class="book-dialog">
      <button class="dialog-close" type="button" aria-label="关闭详情">×</button>
      <div id="dialogContent" class="dialog-content"></div>
    </dialog>

    <script src="./src/books.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
